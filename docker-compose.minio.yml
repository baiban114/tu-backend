# Standalone MinIO (generic infra — not tied to tu project naming).
# Does not start MySQL, ES, or other stacks.
#
#   cd tu-backend
#   copy .env.minio.example .env.minio
#   docker compose -f docker-compose.minio.yml --env-file .env.minio pull
#   docker compose -f docker-compose.minio.yml --env-file .env.minio up -d
#
# Console: http://localhost:${MINIO_CONSOLE_PORT:-9001}
# S3 API:  http://localhost:${MINIO_API_PORT:-9000}

name: minio

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tuadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tu123456}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  minio-data:
