spring:
  application:
    name: tu-backend
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  datasource:
    username: ${SPRING_DATASOURCE_USERNAME:tu}
    password: ${SPRING_DATASOURCE_PASSWORD:tu123456}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  servlet:
    multipart:
      max-file-size: ${STORAGE_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${STORAGE_MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: info

rag:
  enabled: ${RAG_ENABLED:true}
  service-url: ${RAG_SERVICE_URL:http://localhost:19080}

integration:
  service-url: ${INTEGRATION_SERVICE_URL:http://localhost:18100}

search:
  enabled: ${SEARCH_ENABLED:true}
  index: ${SEARCH_INDEX:tu_pages}
  elasticsearch-api-version: ${SEARCH_ES_API_VERSION:8}

ai:
  agent:
    tool-loop:
      enabled: ${AI_AGENT_TOOL_LOOP_ENABLED:true}
      max-tool-rounds: ${AI_AGENT_MAX_TOOL_ROUNDS:8}
    web-search:
      tavily-api-key: ${TAVILY_API_KEY:}
      max-results: ${AI_AGENT_WEB_SEARCH_MAX_RESULTS:5}
    http:
      connect-timeout: ${AI_AGENT_HTTP_CONNECT_TIMEOUT:30s}
      read-timeout: ${AI_AGENT_HTTP_READ_TIMEOUT:5m}
      request-timeout: ${AI_AGENT_HTTP_REQUEST_TIMEOUT:5m}

index:
  flush-interval-ms: ${INDEX_FLUSH_INTERVAL_MS:300000}
  fingerprint-enabled: ${INDEX_FINGERPRINT_ENABLED:true}

storage:
  enabled: ${STORAGE_ENABLED:true}
  s3-endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:9000}
  s3-region: ${STORAGE_S3_REGION:us-east-1}
  s3-access-key: ${STORAGE_S3_ACCESS_KEY:tuadmin}
  s3-secret-key: ${STORAGE_S3_SECRET_KEY:tu123456}
  s3-bucket: ${STORAGE_S3_BUCKET:tu-files}
  s3-path-style: ${STORAGE_S3_PATH_STYLE:true}
  max-file-size: ${STORAGE_MAX_FILE_SIZE:20971520}

secret:
  # Development fallback key. Override TU_SECRET_ENCRYPTION_KEY in production.
  encryption-key: ${TU_SECRET_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
