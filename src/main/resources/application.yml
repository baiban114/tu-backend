spring:
  application:
    name: tu-backend
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  datasource:
    username: ${SPRING_DATASOURCE_USERNAME:tu}
    password: ${SPRING_DATASOURCE_PASSWORD:tu123456}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: info

rag:
  enabled: ${RAG_ENABLED:true}
  service-url: ${RAG_SERVICE_URL:http://localhost:19080}

integration:
  service-url: ${INTEGRATION_SERVICE_URL:http://localhost:18100}
