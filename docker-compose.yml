services:
  mysql:
    image: mysql:8.4
    container_name: tu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tu_db
      MYSQL_USER: tu
      MYSQL_PASSWORD: tu123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  tu-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tu-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tu_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: tu
      SPRING_DATASOURCE_PASSWORD: tu123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "18080:8080"

volumes:
  mysql-data:
