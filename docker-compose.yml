services:
  mysql:
    image: mysql:8.4
    container_name: tu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tu_db
      MYSQL_USER: tu
      MYSQL_PASSWORD: tu123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: tu-postgres
    profiles:
      - postgresql
    environment:
      POSTGRES_DB: tu_db
      POSTGRES_USER: tu
      POSTGRES_PASSWORD: tu123456
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tu -d tu_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  tu-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tu-backend
    depends_on:
      mysql:
        condition: service_healthy
      tu-rag-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tu_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: tu
      SPRING_DATASOURCE_PASSWORD: tu123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      RAG_SERVICE_URL: http://tu-rag-service:19080
      RAG_ENABLED: "true"
    ports:
      - "18080:8080"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: tu-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  tu-rag-service:
    build:
      context: ../tu-rag-service
      dockerfile: Dockerfile
    container_name: tu-rag-service
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: tu_rag_chunks
      RAG_VECTOR_SIZE: 256
    ports:
      - "19080:19080"

volumes:
  mysql-data:
  postgres-data:
  qdrant-data:
