services:
  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: tu-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"

  mysql:
    image: mysql:8.4
    container_name: tu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tu_db}
      MYSQL_USER: ${MYSQL_USER:-tu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tu123456}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: tu-postgres
    profiles:
      - postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tu_db}
      POSTGRES_USER: ${POSTGRES_USER:-tu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tu123456}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tu} -d ${POSTGRES_DB:-tu_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: tu-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  kaneo-postgres:
    image: postgres:16
    container_name: tu-kaneo-postgres
    environment:
      POSTGRES_DB: ${KANEO_POSTGRES_DB:-kaneo}
      POSTGRES_USER: ${KANEO_POSTGRES_USER:-kaneo}
      POSTGRES_PASSWORD: ${KANEO_POSTGRES_PASSWORD:-kaneo}
    ports:
      - "${KANEO_POSTGRES_PORT:-15432}:5432"
    volumes:
      - kaneo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KANEO_POSTGRES_USER:-kaneo} -d ${KANEO_POSTGRES_DB:-kaneo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kaneo:
    image: ghcr.io/usekaneo/kaneo:latest
    container_name: tu-kaneo
    depends_on:
      kaneo-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${KANEO_POSTGRES_USER:-kaneo}:${KANEO_POSTGRES_PASSWORD:-kaneo}@kaneo-postgres:5432/${KANEO_POSTGRES_DB:-kaneo}
      KANEO_CLIENT_URL: ${KANEO_CLIENT_URL:-http://localhost:11337}
      AUTH_SECRET: ${KANEO_AUTH_SECRET:-tu-dev-kaneo-auth-secret-change-me}
      POSTGRES_PASSWORD: ${KANEO_POSTGRES_PASSWORD:-kaneo}
      NODE_ENV: production
    ports:
      - "${KANEO_PORT:-11337}:5173"

volumes:
  mysql-data:
  postgres-data:
  qdrant-data:
  kaneo-postgres-data:
